name: FishingApp
options:
  bundleIdPrefix: com.rachelgreenai
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  FishingApp:
    type: application
    platform: iOS
    sources:
      - ios/FishingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rachelgreenai.fishingapp
        PRODUCT_NAME: Catch ID
        INFOPLIST_FILE: ios/FishingApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    info:
      path: ios/FishingApp/Info.plist
      properties:
        CFBundleDisplayName: Catch ID
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: Select a fish photo for identification evidence.
        NSCameraUsageDescription: Capture a fish photo for identification evidence.
        NSLocationWhenInUseUsageDescription: Use your approximate location to improve fish range and season context for identification.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
schemes:
  FishingApp:
    build:
      targets:
        FishingApp: all
    run:
      config: Debug
